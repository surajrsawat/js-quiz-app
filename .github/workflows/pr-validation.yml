name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-title-check:
    name: PR Title & Description Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate PR Title Format
        uses: amannn/action-semantic-pull-request@v5
        with:
          types: |
            feat
            fix
            docs
            refactor
            test
            chore
            ci
            perf
            build
          requireScope: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check PR Description
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ -z "$PR_BODY" ] || [ "$PR_BODY" == "null" ]; then
            echo "❌ PR description is empty. Please provide a description of your changes."
            exit 1
          fi
          echo "✅ PR description is present"

      - name: Check PR File Count Limit
        run: |
          CHANGED_FILES=${{ github.event.pull_request.changed_files }}
          MAX_FILES=30

          if [ "$CHANGED_FILES" -le "$MAX_FILES" ]; then
            echo "✅ PR file count check passed: $CHANGED_FILES files changed (limit: $MAX_FILES)"
            exit 0
          fi

          echo "❌ PR file count check failed: $CHANGED_FILES files changed (limit: $MAX_FILES)"
          exit 1

  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run coverage

      - name: Check coverage threshold
        run: |
          node -e "const fs=require('fs'); const threshold=80; const file='coverage/coverage-summary.json'; if(!fs.existsSync(file)){console.log('Coverage summary missing, skipping threshold check.'); process.exit(0);} const summary=JSON.parse(fs.readFileSync(file,'utf8')); const pct=Number(summary?.total?.statements?.pct ?? 0); if (Number.isNaN(pct)){console.error('Invalid coverage summary format.'); process.exit(1);} if (pct < threshold){console.error('Code coverage (' + pct + '%) is below the required threshold (' + threshold + '%)'); process.exit(1);} console.log('Code coverage (' + pct + '%) meets the required threshold (' + threshold + '%)');"

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed: dist directory not created"
            exit 1
          fi
          echo "✅ Build successful"
